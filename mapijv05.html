    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f4f4f9;
            -webkit-user-select: none;
            user-select: none;
            touch-action: manipulation;
        }

        .control-panel {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            font-weight: bold;
            color: #495057;
            margin-bottom: 5px;
        }

        textarea, input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-weight: bold;
            color: #333;
        }

        textarea {
            resize: vertical;
            white-space: pre;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            background-color: #0056b3;
            color: white;
            font-weight: bold;
            font-size: 1.1em;
            transition: background-color 0.2s;
            width: 100%;
            margin-bottom: 10px;
        }

        button:hover { background-color: #004494; }

        .nav-controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #e9ecef;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 10px;
        }

        .nav-controls button {
            width: auto;
            margin: 0;
            background-color: #6c757d;
        }
        .nav-controls button:hover { background-color: #5a6268; }
        .nav-controls button:disabled { background-color: #cccccc; cursor: not-allowed; }

        #counter-text {
            font-weight: bold;
            font-size: 1.2em;
            color: #333;
        }

        #toggle-mode-btn {
            background-color: #28a745;
        }
        #toggle-mode-btn:hover {
            opacity: 0.9;
        }

        .video-container {
            background: #000;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            position: relative;
            width: 100%;
            height: 60vh;
            overflow: auto; 
            -webkit-overflow-scrolling: touch;
        }

        #iframe-wrapper {
            width: 100%;
            height: 100%;
            transform-origin: top left;
            transition: transform 0.1s ease-out;
            position: relative;
        }

        #zoom-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10;
            display: none;
            background: rgba(0,0,0,0);
        }

        iframe {
            display: block;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>

    <script>
        const videoUrlInput = document.getElementById('video-url');
        const replaceWordInput = document.getElementById('replace-word');
        const loadBtn = document.getElementById('load-btn');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const counterText = document.getElementById('counter-text');
        
        const iframeWrapper = document.getElementById('iframe-wrapper');
        const playerFrame = document.getElementById('player-frame');
        const viewport = document.getElementById('viewport');
        const zoomOverlay = document.getElementById('zoom-overlay');
        const toggleModeBtn = document.getElementById('toggle-mode-btn');

        let playlist = [];
        let currentIndex = 0;

        // --- LISTA ÉS LAPOZÁS LOGIKA ---
        function updateVideo() {
            if (playlist.length === 0) return;
            
            const rawUrl = playlist[currentIndex];
            const replaceWord = replaceWordInput.value.trim();
            let finalUrl = rawUrl.replaceAll('mapij', replaceWord);
            
            // Kötelező némítás és automata lejátszás paraméterek hozzáadása
            const autoPlayParams = "autoplay=true&muted=true";
            finalUrl += (finalUrl.includes('?') ? '&' : '?') + autoPlayParams;

            playerFrame.src = finalUrl;
            counterText.textContent = `${currentIndex + 1} / ${playlist.length}`;

            // Nagyítás reset
            currentScale = 1.0;
            iframeWrapper.style.transform = `scale(${currentScale})`;
            iframeWrapper.style.width = '100%';
            iframeWrapper.style.height = '100%';
        }

        loadBtn.addEventListener('click', () => {
            // Szövegdoboz sorainak beolvasása, üres sorok kiszűrése
            const lines = videoUrlInput.value.split('\n').map(line => line.trim()).filter(line => line.length > 0);
            
            if (lines.length === 0) {
                alert("Kérlek, adj meg legalább egy linket!");
                return;
            }

            playlist = lines;
            currentIndex = 0;
            
            prevBtn.disabled = playlist.length <= 1;
            nextBtn.disabled = playlist.length <= 1;

            updateVideo();
        });

        nextBtn.addEventListener('click', () => {
            if (playlist.length === 0) return;
            currentIndex = (currentIndex + 1) % playlist.length;
            updateVideo();
        });

        prevBtn.addEventListener('click', () => {
            if (playlist.length === 0) return;
            currentIndex = (currentIndex - 1 + playlist.length) % playlist.length;
            updateVideo();
        });

        // --- AUTOMATA LÉPTETÉS PRÓBÁLKOZÁSA (Ha a szolgáltató támogatja) ---
        window.addEventListener('message', (event) => {
            try {
                let data = event.data;
                if (typeof data === 'string') {
                    try { data = JSON.parse(data); } catch(e) {}
                }
                
                // Keresünk tipikus "videó vége" üzeneteket
                if (data === 'ended' || data.event === 'ended' || data.message === 'ended') {
                    nextBtn.click();
                }
            } catch(e) {}
        });

        // --- MÓD VÁLTÓGOMB LOGIKA ---
        let isZoomMode = false;
        
        toggleModeBtn.addEventListener('click', () => {
            isZoomMode = !isZoomMode;
            if (isZoomMode) {
                toggleModeBtn.textContent = 'Mód: NAGYÍTÁS ÉS MOZGATÁS (Kattints ide a vezérléshez!)';
                toggleModeBtn.style.backgroundColor = '#dc3545';
                zoomOverlay.style.display = 'block';
            } else {
                toggleModeBtn.textContent = 'Mód: VIDEÓ VEZÉRLÉS (Kattints ide a nagyításhoz!)';
                toggleModeBtn.style.backgroundColor = '#28a745';
                zoomOverlay.style.display = 'none';
            }
        });

        // --- KÉT UJJAS NAGYÍTÁS (PINCH-TO-ZOOM) ---
        let currentScale = 1.0;
        let initialPinchDistance = null;
        let startPinchScale = 1.0;

        viewport.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2 && isZoomMode) {
                initialPinchDistance = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                startPinchScale = currentScale;
            }
        }, { passive: false });

        viewport.addEventListener('touchmove', (e) => {
            if (e.touches.length === 2 && initialPinchDistance !== null && isZoomMode) {
                e.preventDefault();

                const currentDistance = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );

                currentScale = startPinchScale * (currentDistance / initialPinchDistance);
                currentScale = Math.max(1.0, Math.min(currentScale, 4.0));
                
                iframeWrapper.style.transform = `scale(${currentScale})`;
                iframeWrapper.style.width = (100 * currentScale) + '%';
                iframeWrapper.style.height = (100 * currentScale) + '%';
            }
        }, { passive: false });

        viewport.addEventListener('touchend', (e) => {
            if (e.touches.length < 2) {
                initialPinchDistance = null;
            }
        });
    </script>
</body>
