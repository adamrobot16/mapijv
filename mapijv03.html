<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Lejátszó">
    <link rel="apple-touch-icon" href="https://via.placeholder.com/192/111111/FFFFFF?text=%E2%96%B6">
    
    <title>Iframe Lejátszó</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f4f4f9;
            -webkit-user-select: none;
            user-select: none;
            touch-action: manipulation;
        }

        .control-panel {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            font-weight: bold;
            color: #495057;
            margin-bottom: 5px;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-weight: bold;
            color: #333;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            background-color: #0056b3;
            color: white;
            font-weight: bold;
            font-size: 1.1em;
            transition: background-color 0.2s;
            width: 100%;
            margin-bottom: 10px;
        }

        button:hover { background-color: #004494; }

        #toggle-mode-btn {
            background-color: #28a745; /* Zöld szín alapból */
        }
        #toggle-mode-btn:hover {
            opacity: 0.9;
        }

        .video-container {
            background: #000;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            position: relative;
            width: 100%;
            height: 60vh;
            overflow: auto; 
            -webkit-overflow-scrolling: touch;
        }

        #iframe-wrapper {
            width: 100%;
            height: 100%;
            transform-origin: top left;
            transition: transform 0.1s ease-out;
            position: relative;
        }

        /* Ez a láthatatlan réteg fogja fel a tapizást nagyításkor */
        #zoom-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10;
            display: none; /* Alapból kikapcsolva */
            background: rgba(0,0,0,0);
        }

        iframe {
            display: block;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="control-panel">
        <div class="input-group">
            <label for="video-url">Beágyazás linkje (Iframe URL):</label>
            <input type="text" id="video-url" value="https://iframe.mapij.net/embed/99914/58594088-1c76-4090-bcfc-f79c80da4982" placeholder="Illeszd be a linket...">
        </div>
        
        <div class="input-group">
            <label for="replace-word">A 'mapij' szó lecserélése erre:</label>
            <input type="text" id="replace-word" value="mapij" placeholder="Írd be a csere szót...">
        </div>
        
        <button id="load-btn">Betöltés</button>
        
        <hr style="border: 0; border-top: 1px solid #eee; margin: 15px 0;">
        
        <button id="toggle-mode-btn">Mód: VIDEÓ VEZÉRLÉS (Kattints a nagyításhoz!)</button>
    </div>

    <div class="video-container" id="viewport">
        <div id="iframe-wrapper">
            <div id="zoom-overlay"></div>
            
            <iframe 
                id="player-frame" 
                src=""
                loading="lazy" 
                allow="accelerometer; gyroscope; autoplay; encrypted-media; picture-in-picture;" 
                allowfullscreen="true">
            </iframe>
        </div>
    </div>

    <script>
        const videoUrlInput = document.getElementById('video-url');
        const replaceWordInput = document.getElementById('replace-word');
        const loadBtn = document.getElementById('load-btn');
        const iframeWrapper = document.getElementById('iframe-wrapper');
        const playerFrame = document.getElementById('player-frame');
        const viewport = document.getElementById('viewport');
        const zoomOverlay = document.getElementById('zoom-overlay');
        const toggleModeBtn = document.getElementById('toggle-mode-btn');

        // --- MÓD VÁLTÓGOMB LOGIKA ---
        let isZoomMode = false;
        
        toggleModeBtn.addEventListener('click', () => {
            isZoomMode = !isZoomMode;
            if (isZoomMode) {
                // Nagyítás mód bekapcsolva
                toggleModeBtn.textContent = 'Mód: NAGYÍTÁS ÉS MOZGATÁS (Kattints ide a vezérléshez!)';
                toggleModeBtn.style.backgroundColor = '#dc3545'; // Pirosra vált
                zoomOverlay.style.display = 'block'; // Bekapcsol a láthatatlan védőréteg
            } else {
                // Vezérlés mód bekapcsolva
                toggleModeBtn.textContent = 'Mód: VIDEÓ VEZÉRLÉS (Kattints ide a nagyításhoz!)';
                toggleModeBtn.style.backgroundColor = '#28a745'; // Zöldre vált
                zoomOverlay.style.display = 'none'; // Kikapcsol a láthatatlan védőréteg
            }
        });

        // --- VIDEÓ BETÖLTÉSE ---
        loadBtn.addEventListener('click', () => {
            const rawUrl = videoUrlInput.value.trim();
            const replaceWord = replaceWordInput.value.trim();
            if (!rawUrl) return;

            const finalUrl = rawUrl.replaceAll('mapij', replaceWord);
            playerFrame.src = finalUrl;

            // Betöltéskor visszaállítjuk a nagyítást az alapállapotra
            currentScale = 1.0;
            iframeWrapper.style.transform = `scale(${currentScale})`;
            iframeWrapper.style.width = '100%';
            iframeWrapper.style.height = '100%';
        });

        // --- KÉT UJJAS NAGYÍTÁS (PINCH-TO-ZOOM) ---
        let currentScale = 1.0;
        let initialPinchDistance = null;
        let startPinchScale = 1.0;

        viewport.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2 && isZoomMode) {
                initialPinchDistance = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                startPinchScale = currentScale;
            }
        }, { passive: false });

        viewport.addEventListener('touchmove', (e) => {
            if (e.touches.length === 2 && initialPinchDistance !== null && isZoomMode) {
                e.preventDefault(); // Megakadályozza a teljes weboldal nagyítását

                const currentDistance = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );

                currentScale = startPinchScale * (currentDistance / initialPinchDistance);
                currentScale = Math.max(1.0, Math.min(currentScale, 4.0));
                
                iframeWrapper.style.transform = `scale(${currentScale})`;
                iframeWrapper.style.width = (100 * currentScale) + '%';
                iframeWrapper.style.height = (100 * currentScale) + '%';
            }
        }, { passive: false });

        viewport.addEventListener('touchend', (e) => {
            if (e.touches.length < 2) {
                initialPinchDistance = null;
            }
        });
    </script>
</body>
</html>
